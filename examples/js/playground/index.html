<!doctype html>
<html lang="en" style="background-color: #21252b;">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Observers</title>
  <style>
    body {
      font-family: 'Lucida Console', 'Monaco', monospace;
      background-color: #21252b;
    }

    .playground {
      max-width: 800px;
      margin: 0 auto;
      border: 1px solid #444;
      border-radius: 6px;
      overflow: hidden;
      background: #282c34;
    }

    .toolbar {
      padding: 10px;
      background: #21252b;
      border-bottom: 1px solid #444;
      display: flex;
      gap: 10px;
    }

    button {
      background: #3b4048;
      color: white;
      border: 1px solid #181a1f;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: #4b5263;
    }

    .tabs {
      display: flex;
      gap: 0;
      background: #21252b;
      border-bottom: 1px solid #444;
    }

    .tab {
      appearance: none;
      background: transparent;
      color: #fff;
      border: none;
      border-right: 1px solid #444;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
    }

    .tab:last-child {
      border-right: none;
    }

    .tab[aria-selected="true"] {
      background: #282c34;
      border-bottom: 2px solid #fff;
    }

    .tab:hover {
      background: #3b4048;
    }

    .tab:focus-visible {
      outline: 2px solid #4b5263;
      outline-offset: -2px;
    }

    .tabpanel {
      background: #282c34;
    }

    /* Editor area */
    .cm-editor {
      height: 400px;
      font-size: 14px;
    }

    /* Console Output */
    .console {
      height: 150px;
      background: #282c34;
      overflow-y: auto;
      padding: 10px;
      font-family: 'Lucida Console', 'Monaco', monospace;
      border-top: 1px solid #444;
      font-size: 13px;
    }

    .log-line {
      border-bottom: 1px solid #222;
      padding: 2px 0;
    }

    .log-error {
      color: #ff5555;
    }

    .log-warn {
      color: #ffb86c;
    }

    .log-log {
      color: #f8f8f2;
    }

    iframe {
      width: 100%;
      border: none;
      display: block;
    }
  </style>
</head>

<body>
  <div class="playground">
    <iframe id="vtk-iframe" src="about:blank" scrolling="no"></iframe>

    <div class="tabs" role="tablist" aria-label="Code tabs">
      <button class="tab" id="tab-js" type="button" role="tab" aria-selected="true" aria-controls="panel-js"
        tabindex="0">JS</button>
      <button class="tab" id="tab-html" type="button" role="tab" aria-selected="false" aria-controls="panel-html"
        tabindex="-1">HTML</button>
    </div>

    <div id="panel-html" class="tabpanel" role="tabpanel" aria-labelledby="tab-html" hidden>
      <div id="editor-host-html"></div>
    </div>
    <div id="panel-js" class="tabpanel" role="tabpanel" aria-labelledby="tab-js">
      <div id="editor-host-js"></div>
    </div>

    <div class="toolbar">
      <button id="run-btn">Run</button>
      <button id="reset-btn">Reset</button>
    </div>
    <div id="console-output" class="console">
      <div class="log-line">> Ready.</div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>

</html>
